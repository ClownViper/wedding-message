<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congratulations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Zen Maru Gothic', system-ui, sans-serif;
      color: #5c5346;
      background: linear-gradient(160deg, #f7f4ed 0%, #efe9dd 55%, #e3e7dc 100%);
      overflow-x: hidden;
    }

    .section {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      overflow: hidden;
    }

    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .content { position: relative; z-index: 2; }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1.6;
      font-weight: 700;
      color: #7a8a6a;
    }

    p {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      line-height: 2.1;
      max-width: 32rem;
      font-weight: 500;
    }

    .emoji { font-size: clamp(2.5rem, 10vw, 4rem); margin-bottom: 1.5rem; }

    /* 写真の枠 */
    .photo-frame {
      width: min(80vw, 360px);
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(120, 110, 90, 0.18);
      background: #efe9dd;
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* 写真がまだ無いときのプレースホルダー表示 */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      color: #b0a690;
      border: 2px dashed #cabfa5;
      font-size: 0.95rem;
    }
    .photo-placeholder .ph-icon { font-size: 2rem; }
    .photo-caption {
      margin-top: 1rem;
      font-size: 1rem;
      color: #8a7f6b;
    }

    .leaf {
      position: absolute;
      width: clamp(80px, 18vw, 160px);
      color: #b6c2a3;
      opacity: 0.55;
      z-index: 1;
      pointer-events: none;
    }
    .leaf.top-left    { top: -10px; left: -20px; transform: rotate(15deg); }
    .leaf.top-right   { top: -10px; right: -20px; transform: scaleX(-1) rotate(15deg); }
    .leaf.bottom-left { bottom: -10px; left: -20px; transform: scaleY(-1) rotate(15deg); }
    .leaf.bottom-right{ bottom: -10px; right: -20px; transform: scale(-1) rotate(15deg); }

    .divider {
      width: 60px; height: 1px;
      background: #b6a98c;
      margin: 1.8rem auto 0;
      position: relative;
    }
    .divider::before {
      content: "❦";
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      color: #b6a98c; font-size: 1rem;
      padding: 0 0.4rem; line-height: 1;
    }
    .divider-wrap { display: inline-block; background: linear-gradient(160deg,#f7f4ed,#efe9dd); }

    .scroll-hint {
      position: fixed; bottom: 1.5rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem; color: #a89f8e;
      animation: bounce 2s infinite;
      transition: opacity 0.5s ease;
      z-index: 10;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }
  </style>
</head>
<body>

  <svg width="0" height="0" style="position:absolute">
    <symbol id="leaf-branch" viewBox="0 0 100 100">
      <path d="M50 95 Q50 50 50 5" stroke="currentColor" stroke-width="2" fill="none"/>
      <path d="M50 80 Q30 70 25 50 Q45 58 50 75 Z" fill="currentColor"/>
      <path d="M50 65 Q70 55 75 35 Q55 43 50 60 Z" fill="currentColor"/>
      <path d="M50 48 Q32 40 28 22 Q46 30 50 45 Z" fill="currentColor"/>
      <path d="M50 32 Q68 24 72 8 Q54 16 50 30 Z" fill="currentColor"/>
    </symbol>
  </svg>

  <section class="section">
    <svg class="leaf top-left"><use href="#leaf-branch"/></svg>
    <svg class="leaf top-right"><use href="#leaf-branch"/></svg>
    <div class="content reveal">
      <div class="emoji">🌿</div>
      <h1>ご結婚<br>おめでとう</h1>
      <div class="divider-wrap"><div class="divider"></div></div>
    </div>
  </section>

  <section class="section">
    <p class="content reveal">
      ふたりが出会えたことも<br>
      今日この日を迎えられたことも<br>
      きっと特別なご縁ですね。
    </p>
  </section>

  <!-- 写真セクション① -->
  <section class="section">
    <svg class="leaf bottom-right"><use href="#leaf-branch"/></svg>
    <div class="content reveal">
      <div class="photo-frame">
        <!-- 写真を入れるときは下のコメントを外して src を画像ファイル名にする -->
        <!-- <img src="photo1.jpg" alt="ふたりの写真"> -->
        <div class="photo-placeholder">
          <span class="ph-icon">📷</span>
          <span>ここに写真が入ります</span>
        </div>
      </div>
      <p class="photo-caption">ふたりらしい一枚を。</p>
    </div>
  </section>

  <section class="section">
    <svg class="leaf top-left"><use href="#leaf-branch"/></svg>
    <p class="content reveal">
      これからの毎日が<br>
      笑顔のあふれる<br>
      あたたかなものになりますように。
    </p>
  </section>

  <!-- 写真セクション② -->
  <section class="section">
    <svg class="leaf top-right"><use href="#leaf-branch"/></svg>
    <div class="content reveal">
      <div class="photo-frame">
        <!-- <img src="photo2.jpg" alt="ふたりの写真"> -->
        <div class="photo-placeholder">
          <span class="ph-icon">📷</span>
          <span>ここに写真が入ります</span>
        </div>
      </div>
      <p class="photo-caption">大切な思い出とともに。</p>
    </div>
  </section>

  <section class="section">
    <svg class="leaf bottom-left"><use href="#leaf-branch"/></svg>
    <svg class="leaf bottom-right"><use href="#leaf-branch"/></svg>
    <div class="content reveal">
      <div class="emoji">🤍</div>
      <h1>末永く<br>お幸せに</h1>
      <div class="divider-wrap"><div class="divider"></div></div>
    </div>
  </section>

  <div class="scroll-hint">▼ スクロール</div>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) entry.target.classList.add('visible');
      });
    }, { threshold: 0.4 });
    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    const lastSection = document.querySelector('.section:last-of-type .reveal');
    let celebrated = false;
    const finale = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting && !celebrated) {
          celebrated = true;
          launchConfetti();
        }
      });
    }, { threshold: 0.6 });
    finale.observe(lastSection);

    window.addEventListener('load', () => {
      setTimeout(() => {
        confetti({
          particleCount: 80, spread: 70, origin: { y: 0.6 },
          colors: ['#a8b894', '#d4c9a8', '#e8e2d5', '#bcae8e']
        });
      }, 800);
    });

    window.addEventListener('scroll', () => {
      const hint = document.querySelector('.scroll-hint');
      if (window.scrollY > 100) hint.style.opacity = '0';
    }, { passive: true });

    function launchConfetti() {
      const end = Date.now() + 1500;
      const colors = ['#a8b894', '#d4c9a8', '#e8e2d5', '#bcae8e'];
      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }
  </script>

</body>
</html>
