<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Congratulations</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      color: #444;
      background: linear-gradient(135deg, #fdeef2, #eef3fd);
      overflow-x: hidden;
    }

    /* 各メッセージは1画面分の高さを使い、中央に配置 */
    .section {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    /* 最初は透明・少し下にずらしておき、表示時にふわっと上がる */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1.2s ease, transform 1.2s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    h1 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      line-height: 1.5;
      font-weight: 700;
    }

    p {
      font-size: clamp(1.1rem, 4vw, 1.5rem);
      line-height: 2;
      max-width: 32rem;
    }

    .emoji { font-size: clamp(2.5rem, 10vw, 4rem); margin-bottom: 1.5rem; }

    .scroll-hint {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #999;
      animation: bounce 2s infinite;
      transition: opacity 0.5s ease;
    }
    @keyframes bounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }
  </style>
</head>
<body>

  <section class="section">
    <div class="reveal">
      <div class="emoji">💐</div>
      <h1>ご結婚<br>おめでとう</h1>
    </div>
  </section>

  <section class="section">
    <p class="reveal">
      ふたりが出会えたことも<br>
      今日この日を迎えられたことも<br>
      きっと特別なご縁ですね。
    </p>
  </section>

  <section class="section">
    <p class="reveal">
      これからの毎日が<br>
      笑顔のあふれる<br>
      あたたかなものになりますように。
    </p>
  </section>

  <section class="section">
    <div class="reveal">
      <div class="emoji">🎉</div>
      <h1>末永く<br>お幸せに</h1>
    </div>
  </section>

  <div class="scroll-hint">▼ スクロール</div>

  <script>
    // 各メッセージが画面に入ったら visible クラスを付けてフェードイン
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.4 });

    document.querySelectorAll('.reveal').forEach((el) => observer.observe(el));

    // 最後のセクションに到達したら紙吹雪を一度だけ舞わせる
    const lastSection = document.querySelector('.section:last-of-type .reveal');
    let celebrated = false;
    const finale = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting && !celebrated) {
          celebrated = true;
          launchConfetti();
        }
      });
    }, { threshold: 0.6 });
    finale.observe(lastSection);

    // 開いた直後にも軽くお祝い
    window.addEventListener('load', () => {
      setTimeout(() => {
        confetti({ particleCount: 80, spread: 70, origin: { y: 0.6 } });
      }, 800);
    });

    // スクロールしたらヒントを消す
    window.addEventListener('scroll', () => {
      const hint = document.querySelector('.scroll-hint');
      if (window.scrollY > 100) hint.style.opacity = '0';
    }, { passive: true });

    // 紙吹雪を左右から数回に分けて舞わせる
    function launchConfetti() {
      const end = Date.now() + 1500;
      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) requestAnimationFrame(frame);
      })();
    }
  </script>

</body>
</html>
